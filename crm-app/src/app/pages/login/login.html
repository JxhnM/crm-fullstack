<div class="container">
  <div class="card">
    <h2>Iniciar Sesión</h2>
    <div *ngIf="error" class="error">{{ error }}</div>
    <input type="email" placeholder="Email" [(ngModel)]="email" />
    <input type="password" placeholder="Contraseña" [(ngModel)]="password" />
    <button (click)="login()">Entrar</button>
  </div>
</div>
